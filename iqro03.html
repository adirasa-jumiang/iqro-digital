  const audio = new Audio();

  function renderPage() {
    const content = document.getElementById('content');
    content.innerHTML = '';
    const progress = ((currentPage + 1) / pages.length) * 100;
    document.getElementById("progressFill").style.width = progress + "%";

    pages[currentPage].forEach(line => {
      const lineDiv = document.createElement('div');
      lineDiv.className = 'line';

      line.forEach(text => {
        const span = document.createElement('div');
        span.className = 'item';
        span.style.fontSize = fontSize + "px";
        //span.textContent = text;
        span.innerHTML = text;
        //span.onclick = () => play(span, text);
        span.onclick = () => play(span, span.innerText);
        lineDiv.appendChild(span);
      });

      content.appendChild(lineDiv);
    });

    document.getElementById('jumpPage').value = currentPage + 1;
    document.getElementById('totalPage').textContent = pages.length;

    // tandai halaman aktive
  updateActivePage();

localStorage.setItem("iqro3_lastPage", currentPage);

function changePage(direction) {
  const newPage = currentPage + direction;
  if (newPage >= 0 && newPage < pages.length) {

    const content = document.getElementById('content');

    // tentukan arah animasi
    const animationClass = direction > 0 ? 
        "slide-in-right" : 
        "slide-in-left";

    content.classList.remove("slide-in-right", "slide-in-left");

    currentPage = newPage;
    renderPage();

    // trigger animasi
    void content.offsetWidth; // reset animation
    content.classList.add(animationClass);
  }
}

document.getElementById('jumpPage').addEventListener('change', function () {
  const page = parseInt(this.value) - 1;
  if (page >= 0 && page < pages.length) {

    const content = document.getElementById('content');

    content.classList.remove("slide-in-right", "slide-in-left");

    currentPage = page;
    renderPage();

    void content.offsetWidth;
    content.classList.add("slide-in-right");

  } else {
    this.value = currentPage + 1;
  }
});

  function play(el, text) {
    document.querySelectorAll('.item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');

    const soundEnabled = document.getElementById('soundToggle').checked;
    if (!soundEnabled) return;

    // STOP suara sebelumnya
    audio.pause();
    audio.currentTime = 0;

    // Encode supaya karakter Arab aman
    const fileName = encodeURIComponent(text) + ".mp3";
    audio.src = "audio/" + fileName;
    audio.play().catch(err => console.log("Audio tidak ditemukan:", err));
  }

  function changeFont(amount) {
  fontSize += amount;

  if (fontSize < 20) fontSize = 20;   // batas minimum
  if (fontSize > 80) fontSize = 80;   // batas maksimum

  renderPage();  // render ulang supaya ukuran berubah
}

function resetFont() {
  fontSize = 32;
  renderPage();
}

<script>
  // Fade in saat halaman selesai load
  window.addEventListener("load", function () {
    document.body.classList.add("fade-in");
  });

  // Tangkap semua link
  document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function (e) {
      const href = this.getAttribute("href");

      // kalau link internal
      if (href && !href.startsWith("#") && !this.hasAttribute("target")) {
        e.preventDefault();
        document.body.classList.remove("fade-in");
        document.body.classList.add("fade-out");

        setTimeout(() => {
          window.location.href = href;
        }, 400);
      }
    });
  });
</script>

function updateActivePage() {
  const items = document.querySelectorAll("#pageList li");

  items.forEach((li, index) => {
    if (index === currentPage) {
      li.classList.add("active-page");

      // 🔥 auto scroll ke halaman aktif

        block: "center"
      });

      li.classList.remove("active-page");
    }
  });
}

let touchStartX = 0;
let touchEndX = 0;

const contentArea = document.querySelector(".content-area");

contentArea.addEventListener("touchstart", e => {
  touchStartX = e.changedTouches[0].screenX;
});

contentArea.addEventListener("touchend", e => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
});

function handleSwipe() {
  const swipeDistance = touchEndX - touchStartX;

  if (swipeDistance > 80) {
    changePage(-1); // swipe kanan
  }

  if (swipeDistance < -80) {
    changePage(1); // swipe kiri
  }
}
